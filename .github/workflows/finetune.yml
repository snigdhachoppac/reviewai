name: Fine-Tune Pipeline

on:
  schedule:
    # Collect new training data every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      max_prs:
        description: Max PRs to collect per repo
        default: "300"
        type: string
      min_score:
        description: Minimum quality score (0.0-1.0)
        default: "0.65"
        type: string
      run_training:
        description: Run training after data collection
        default: false
        type: boolean

jobs:
  # ── Stage 1-3: Data collection, filtering, formatting ───────────────────────
  prepare-data:
    name: Collect and prepare training data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: finetune
        run: npm install --save-dev @octokit/rest

      - name: Create data directory
        run: mkdir -p finetune/data

      - name: Stage 1 — Collect PR data
        working-directory: finetune
        run: |
          node scripts/collect.js \
            --repos rails/rails,facebook/react,django/django,expressjs/express \
            --max-prs ${{ github.event.inputs.max_prs || '300' }} \
            --output data/raw.jsonl
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}

      - name: Stage 2 — Filter for quality
        working-directory: finetune
        run: |
          node scripts/filter.js \
            --input data/raw.jsonl \
            --output data/filtered.jsonl \
            --min-score ${{ github.event.inputs.min_score || '0.65' }}

      - name: Stage 3 — Format for training
        working-directory: finetune
        run: |
          node scripts/format.js \
            --input data/filtered.jsonl \
            --output data/train.jsonl \
            --eval data/eval.jsonl \
            --split 0.9

      - name: Upload training data artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-data-${{ github.run_id }}
          path: |
            finetune/data/train.jsonl
            finetune/data/eval.jsonl
            finetune/data/filtered.jsonl
          retention-days: 30

      - name: Log data stats
        working-directory: finetune
        run: |
          echo "Raw examples:      $(wc -l < data/raw.jsonl)"
          echo "Filtered examples: $(wc -l < data/filtered.jsonl)"
          echo "Train examples:    $(wc -l < data/train.jsonl)"
          echo "Eval examples:     $(wc -l < data/eval.jsonl)"

  # ── Stage 4: Training (only on manual trigger with run_training=true) ────────
  train:
    name: LoRA fine-tuning (A100 GPU)
    runs-on: ubuntu-latest       # Self-hosted GPU runner in production
    needs: prepare-data
    if: github.event.inputs.run_training == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: finetune
        run: pip install -r requirements.txt

      - name: Download training data
        uses: actions/download-artifact@v4
        with:
          name: training-data-${{ github.run_id }}
          path: finetune/data/

      - name: Run LoRA fine-tuning
        working-directory: finetune
        run: |
          python scripts/train.py \
            --base-model codellama/CodeLlama-7b-Instruct-hf \
            --train-data data/train.jsonl \
            --eval-data data/eval.jsonl \
            --output-dir models/reviewai-v${{ github.run_number }} \
            --lora-r 16 \
            --epochs 3
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload trained adapter
        uses: actions/upload-artifact@v4
        with:
          name: model-adapter-v${{ github.run_number }}
          path: finetune/models/reviewai-v${{ github.run_number }}/adapter/
          retention-days: 90
