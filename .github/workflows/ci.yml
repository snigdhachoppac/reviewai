name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test ────────────────────────────────────────────────────
  test-backend:
    name: Backend tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reviewai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: github-app/package.json

      - name: Install dependencies
        working-directory: github-app
        run: npm install

      - name: Run unit tests
        working-directory: github-app
        run: npm run test:unit
        env:
          NODE_ENV: test

      - name: Run integration tests
        working-directory: github-app
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/reviewai_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
          GITHUB_APP_ID: "12345"
          GITHUB_PRIVATE_KEY: "test-key"
          GITHUB_WEBHOOK_SECRET: "test-secret"
          GITHUB_CLIENT_ID: "test-client-id"
          GITHUB_CLIENT_SECRET: "test-client-secret"

  # ── Frontend: build check ───────────────────────────────────────────────────
  build-dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Build
        working-directory: dashboard
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7

  # ── Docker: build images ────────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test-backend, build-dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./github-app
          push: false
          tags: reviewai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: reviewai-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
